name: BACKEND FINAL NO LOGIN
on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'TaskManager.Tests/**'
      - '.github/workflows/main_taskmanager-backend-95269.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore backend dependencies
        run: dotnet restore ./backend/backend.csproj

      - name: Restore test dependencies
        run: dotnet restore ./TaskManager.Tests/TaskManager.Tests.csproj

      - name: Build backend
        run: dotnet build ./backend/backend.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ./TaskManager.Tests/TaskManager.Tests.csproj --configuration Release --verbosity normal

      - name: Publish backend
        run: dotnet publish ./backend/backend.csproj --configuration Release --output ${{ github.workspace }}/publish

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: ${{ github.workspace }}/publish

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: backend-app
          path: ${{ github.workspace }}/publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'taskmanager-backend-95269'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish