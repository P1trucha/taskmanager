services:
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: taskmanager-database
    restart: always
    user: "0:0"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "StrongPassword123!"
    ports:
      - "1433:1433"
    volumes:
      - dbdata:/var/opt/mssql
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskmanager-backend
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8081"
      ConnectionStrings__DefaultConnection: "Server=database,1433;Database=TaskManagerDb;User Id=sa;Password=StrongPassword123!;TrustServerCertificate=True;"
    ports:
      - "8081:8081"
    depends_on:
      - database
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskmanager-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8081"
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  dbdata:

networks:
  app-network: